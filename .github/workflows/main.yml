name: Publish and Deploy Gateway Container

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/aditya-0011/gateway:latest
            ghcr.io/aditya-0011/gateway:${{ github.sha }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.PAT_TOKEN }}

      - name: Server Setup & Run Podman
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          port: 22
          script: |
            echo "${{ secrets.PAT_TOKEN }}" | podman login ghcr.io -u aditya-0011 --password-stdin

            podman pull ghcr.io/aditya-0011/gateway:latest

            podman stop gateway || true
            podman rm gateway || true

            podman run -d \
              --name gateway \
              --network infra-network \
              -p 3000:3000 \
              --env-file ~/gateway-production.conf \
              --restart unless-stopped \
              ghcr.io/aditya-0011/gateway:latest

            podman image prune -f
